{% extends "base.html" %}

{% block extra_css %}
<style>
    header, footer, .navbar, .sidebar, .wrapper, .content, .content-wrapper {
        display: none !important;
    }

    body {
        background: var(--bg-gradient);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
</style>
{% endblock %}

{% block content %}
<div style="max-width: 420px; width: 100%; margin: 0 auto; padding: 40px; background: var(--bg-card); border-radius: 24px; border: var(--glass-border); box-shadow: var(--shadow-lg);">
    <h2 style="text-align: center; margin-bottom: 16px; color: var(--text-primary); font-size: 24px;">Восстановление пароля</h2>
    <p style="text-align: center; margin-bottom: 30px; color: var(--text-secondary); font-size: 14px;">
        Введите email, и мы отправим одноразовый код для смены пароля.
    </p>

    <div id="reset-request-message"></div>

    <form id="password-reset-request-form" method="post">
        {% csrf_token %}
        <div style="margin-bottom: 24px;">
            <label style="display: block; margin-bottom: 8px; color: var(--text-primary); font-weight: 500;">Email</label>
            <input
                id="reset-request-email"
                type="email"
                name="email"
                required
                autocomplete="email"
                style="width: 100%; padding: 12px 16px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; color: var(--text-primary); font-size: 14px;"
            >
        </div>
        <button id="reset-request-submit" type="submit" class="btn btn--primary" style="width: 100%; padding: 14px; font-size: 16px;">
            Отправить код
        </button>
    </form>

    <div style="text-align: center; margin-top: 20px;">
        <a href="/" style="color: var(--primary); text-decoration: none; font-size: 14px;">
            <i class="bi bi-arrow-left"></i> Вернуться на главную
        </a>
    </div>
</div>

<script>
    (function () {
        const form = document.getElementById("password-reset-request-form");
        if (!form) {
            return;
        }

        const emailInput = document.getElementById("reset-request-email");
        const submitButton = document.getElementById("reset-request-submit");
        const messageBox = document.getElementById("reset-request-message");

        function renderMessage(text, kind) {
            const background = kind === "error" ? "var(--danger-light)" : "var(--success-light)";
            const border = kind === "error" ? "var(--danger)" : "var(--success)";
            const color = kind === "error" ? "var(--danger)" : "var(--success)";

            messageBox.innerHTML = `
                <div style="padding: 12px; margin-bottom: 20px; border-radius: 8px; background: ${background}; border: 1px solid ${border}; color: ${color};">
                    ${text}
                </div>
            `;
        }

        form.addEventListener("submit", async function (event) {
            event.preventDefault();

            const email = emailInput.value.trim();
            if (!email) {
                renderMessage("Введите email.", "error");
                return;
            }

            submitButton.disabled = true;

            try {
                const response = await fetch("/api/mobile/auth/password-reset/request/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Accept": "application/json"
                    },
                    body: JSON.stringify({ email: email })
                });

                const data = await response.json().catch(function () {
                    return {};
                });

                if (!response.ok) {
                    renderMessage(data.detail || "Не удалось отправить код. Попробуйте еще раз.", "error");
                    return;
                }

                renderMessage(
                    data.detail || "Если такая почта есть в системе, код восстановления отправлен.",
                    "success"
                );

                window.setTimeout(function () {
                    window.location.href = `/reset-password/?email=${encodeURIComponent(email)}`;
                }, 700);
            } catch (error) {
                renderMessage("Не удалось отправить код. Попробуйте еще раз.", "error");
            } finally {
                submitButton.disabled = false;
            }
        });
    })();
</script>
{% endblock %}
